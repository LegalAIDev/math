<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Math Runner (Grade 5)</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <header class="hud">
      <div>Distance: <span id="distance">0</span> m</div>
      <div>Coins: <span id="coins">0</span></div>
      <div>Lives: <span id="lives">3</span></div>
    </header>

    <section class="game-wrap">
      <canvas id="game" width="900" height="350" aria-label="Math runner game"></canvas>
      <p class="controls">Controls: <kbd>Space</kbd>/<kbd>↑</kbd> jump, <kbd>↓</kbd> slide, <kbd>P</kbd> pause.</p>
    </section>

    <section class="store">
      <h2>Upgrade Store</h2>
      <p>Buy upgrades by spending coins and solving a grade-5 math problem.</p>
      <div id="store-items" class="store-items"></div>
    </section>
  </main>

  <dialog id="math-dialog">
    <form method="dialog" id="math-form">
      <h3 id="math-title">Math Challenge</h3>
      <p id="math-question"></p>
      <input id="math-answer" type="number" step="any" required autocomplete="off" />
      <p id="math-feedback" class="feedback"></p>
      <menu>
        <button value="cancel" id="cancel-btn">Cancel</button>
        <button value="default" id="submit-btn">Submit</button>
      </menu>
    </form>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
