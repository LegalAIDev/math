<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#1a1140" />
  <title>Math Runner — a grade 5 math adventure</title>
  <meta name="description" content="Math Runner: dash, jump and slide through four worlds, collect coins, and solve grade-5 math problems to power up your runner." />
  <meta property="og:title" content="Math Runner" />
  <meta property="og:description" content="Dash through four worlds and solve math problems to upgrade your runner!" />
  <meta property="og:type" content="website" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%235b6ef5'/%3E%3Ctext x='16' y='24' font-size='22' text-anchor='middle' fill='white' font-family='Arial' font-weight='bold'%3E%2B%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="game" role="application" aria-label="Math Runner game">
    <p class="loading">Loading Math Runner…</p>
  </div>
  <noscript>
    <p style="color:#fff;text-align:center;font-family:sans-serif">
      Math Runner needs JavaScript turned on to play.
    </p>
  </noscript>

  <!-- Game engine (vendored locally so it works on any network) -->
  <script src="lib/phaser.min.js"></script>

  <!-- Game data and helpers (load order matters) -->
  <script src="src/config.js"></script>
  <script src="src/mathProblems.js"></script>
  <script src="src/shopItems.js"></script>
  <script src="src/PlayerState.js"></script>
  <script src="src/DailyQuests.js"></script>
  <script src="src/EnemyFactory.js"></script>
  <script src="src/audio.js"></script>
  <script src="src/ui.js"></script>

  <!-- Scenes (one screen of the game each) -->
  <script src="src/scenes/BootScene.js"></script>
  <script src="src/scenes/MenuScene.js"></script>
  <script src="src/scenes/CharSelectScene.js"></script>
  <script src="src/scenes/WorldMapScene.js"></script>
  <script src="src/scenes/GameScene.js"></script>
  <script src="src/scenes/HudScene.js"></script>
  <script src="src/scenes/MathLabScene.js"></script>
  <script src="src/scenes/ShopScene.js"></script>
  <script src="src/scenes/GameOverScene.js"></script>

  <!-- Starts everything -->
  <script src="src/main.js"></script>
</body>
</html>
